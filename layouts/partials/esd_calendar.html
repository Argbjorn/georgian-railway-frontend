<!-- Flatpickr CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<!-- Flatpickr JS -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>

<style>
.flatpickr-day {
    cursor: default !important;
    border: initial !important;
}

.flatpickr-day:hover {
    background: initial !important;
    border: initial !important;
}

.flatpickr-day.selected {
    background: initial !important;
    border: initial !important;
    color: initial !important;
}

.flatpickr-day.train-day {
    background: #f0f9f0 !important;
    color: #2d5a2d !important;
    font-weight: 600 !important;
    border: initial !important;
}

.flatpickr-day.today {
    background: initial !important;
    color: initial !important;
    font-weight: 600 !important;
}

.flatpickr-day.train-day.today {
    background: #f0f9f0 !important;
    color: initial !important;
    font-weight: 600 !important;
    border: initial !important;
}

.flatpickr-day.prevMonthDay,
.flatpickr-day.nextMonthDay {
    visibility: hidden;
}

.flatpickr-day:not(.train-day):not(.flatpickr-disabled):not(.prevMonthDay):not(.nextMonthDay) {
    color: #bbb !important;
}

.esd-calendar-popup {
    cursor: pointer;
}

.esd-calendar-container {
    display: block;
    margin-top: 8px;
}
</style>

<script>
(function() {
    const calendarName = "{{ .className }}";
    const isInline = "{{ if .inline }}true{{ end }}" === "true";

    function buildTrainDates(timestampStr, endDateStr) {
        let timestamp = Number(timestampStr);
        if (timestamp < 10000000000) timestamp = timestamp * 1000;

        const todayDate = new Date();
        todayDate.setHours(0, 0, 0, 0);
        const currentDate = new Date(timestamp);

        let endDate;
        if (endDateStr) {
            let endTimestamp = Number(endDateStr);
            if (endTimestamp < 10000000000) endTimestamp = endTimestamp * 1000;
            endDate = new Date(endTimestamp);
            if (isNaN(endDate.getTime())) {
                endDate = new Date(todayDate);
                endDate.setMonth(endDate.getMonth() + 3);
            } else {
                endDate.setHours(23, 59, 59, 999);
            }
        } else {
            endDate = new Date(todayDate);
            endDate.setMonth(endDate.getMonth() + 3);
        }

        const trainDates = [];
        while (currentDate <= endDate) {
            if (currentDate >= todayDate) trainDates.push(new Date(currentDate));
            currentDate.setDate(currentDate.getDate() + 2);
        }
        return { trainDates, endDate };
    }

    function onDayCreate(trainDates, dObj, dStr, fp, dayElem) {
        const d = dayElem.dateObj;
        const isTrainDay = trainDates.some(function(t) {
            return t.getDate() === d.getDate() &&
                   t.getMonth() === d.getMonth() &&
                   t.getFullYear() === d.getFullYear();
        });
        if (isTrainDay) dayElem.classList.add('train-day');
    }

    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.' + calendarName).forEach(function(trigger) {
            const { trainDates, endDate } = buildTrainDates(
                trigger.dataset.timestamp,
                trigger.dataset.endDate
            );
            const lang = trigger.dataset.lang || 'en';

            const commonOptions = {
                animate: false,
                disableMobile: true,
                locale: lang,
                dateFormat: "d.m.Y",
                minDate: "today",
                maxDate: endDate,
                monthSelectorType: "static",
                onDayCreate: onDayCreate.bind(null, trainDates)
            };

            if (isInline) {
                const container = document.createElement('div');
                container.className = 'esd-calendar-container';
                trigger.parentNode.insertBefore(container, trigger.nextSibling);
                flatpickr(container, Object.assign({}, commonOptions, { inline: true }));
            } else {
                const hiddenInput = document.createElement('input');
                hiddenInput.type = 'text';
                hiddenInput.style.display = 'none';
                trigger.parentNode.insertBefore(hiddenInput, trigger.nextSibling);
                const fp = flatpickr(hiddenInput, Object.assign({}, commonOptions, {
                    inline: false,
                    closeOnSelect: false,
                    positionElement: trigger
                }));
                trigger.addEventListener('click', function() { fp.open(); });
            }
        });
    });
})();
</script>
